services:
  postgres:
    image: postgres:16-alpine
    container_name: neo-postgres
    environment:
      POSTGRES_USER: neo
      POSTGRES_PASSWORD: neo
      POSTGRES_DB: neo
    ports:
      - "5439:5432"
    volumes:
      - neo-postgres-data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neo -d neo"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  neo-postgres-data:
